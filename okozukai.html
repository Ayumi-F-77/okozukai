<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="おこづかい帳">
<title>🌈 みんなのおこづかい帳</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f7; min-height: 100vh; }
.app { padding: 1rem; max-width: 480px; margin: 0 auto; }
.header { background: linear-gradient(135deg, #ff9de2, #a78bfa, #67e8f9); border-radius: 16px; padding: 1rem 1.25rem; margin-bottom: 1rem; color: white; }
.header h1 { font-size: 20px; font-weight: 600; }
.sync-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-top: 6px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.kid-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.kid-tab { padding: 8px 16px; border-radius: 20px; border: 2px solid transparent; font-size: 14px; cursor: pointer; font-weight: 600; background: #e5e5ea; color: #666; }
.kid-tab.active { color: white; }
.kid-add { padding: 8px 14px; border-radius: 20px; border: 2px dashed #ccc; font-size: 14px; cursor: pointer; background: none; color: #888; }
.card { background: white; border-radius: 16px; padding: 1rem 1.25rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.summary-item { border-radius: 12px; padding: 0.75rem 1rem; }
.summary-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.summary-value { font-size: 22px; font-weight: 700; }
.section-title { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 0.75rem; }
.goal-bar-wrap { background: #f0f0f0; border-radius: 8px; height: 10px; overflow: hidden; margin-top: 6px; }
.goal-bar { height: 100%; border-radius: 8px; transition: width 0.4s; }
.goal-info { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-top: 4px; }
.tabs { display: flex; border-bottom: 1px solid #e5e5ea; margin-bottom: 1rem; background: white; border-radius: 12px 12px 0 0; overflow: hidden; }
.tab { flex: 1; text-align: center; padding: 12px 2px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: #888; background: none; border-top: none; border-left: none; border-right: none; }
.tab.active { border-bottom-color: #a78bfa; color: #333; font-weight: 600; }
.form-row { margin-bottom: 12px; }
.form-row label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; font-weight: 500; }
.form-row input, .form-row select { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; background: white; color: #333; font-family: inherit; -webkit-appearance: none; appearance: none; }
.subcat-input { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; background: #f8f8f8; color: #333; font-family: inherit; margin-top: 6px; }
.subcat-hint { font-size: 11px; color: #aaa; margin-top: 3px; }
.radio-group { display: flex; gap: 6px; }
.radio-btn { flex: 1; padding: 10px 2px; border: 1.5px solid #e0e0e0; border-radius: 10px; text-align: center; cursor: pointer; font-size: 12px; background: white; color: #555; }
.radio-btn.sel-income { border-color: #4ade80; background: #f0fdf4; color: #166534; }
.radio-btn.sel-expense { border-color: #f87171; background: #fef2f2; color: #991b1b; }
.radio-btn.sel-point { border-color: #fb923c; background: #fff7ed; color: #9a3412; }
.submit-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; color: white; margin-top: 4px; }
.history-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.history-item:last-child { border-bottom: none; }
.history-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.history-main { flex: 1; min-width: 0; }
.history-cat { font-size: 14px; color: #333; font-weight: 500; }
.history-subcat { font-size: 12px; color: #888; margin-top: 1px; }
.history-date { font-size: 11px; color: #aaa; margin-top: 2px; }
.history-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.history-amount { font-size: 15px; font-weight: 700; }
.del-btn { background: none; border: none; color: #f87171; cursor: pointer; font-size: 11px; padding: 2px 6px; border: 1px solid #fecaca; border-radius: 6px; }
.cat-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cat-item input { flex: 1; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; }
.cat-del { background: none; border: none; color: #f87171; cursor: pointer; font-size: 20px; padding: 0 4px; line-height: 1; }
.cat-add-btn { background: none; border: 1px dashed #ccc; border-radius: 8px; padding: 8px; font-size: 13px; color: #888; cursor: pointer; width: 100%; margin-top: 4px; }
.cat-save-btn { width: 100%; padding: 10px; border-radius: 10px; border: none; background: #a78bfa; color: white; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.type-label { font-size: 13px; font-weight: 600; margin-bottom: 10px; padding: 4px 10px; border-radius: 8px; display: inline-block; }
.save-msg { font-size: 12px; color: #166534; background: #f0fdf4; border-radius: 8px; padding: 6px 10px; text-align: center; margin-top: 8px; display: none; }
.empty-state { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; line-height: 1.8; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: white; border-radius: 20px; padding: 1.5rem; width: 90%; max-width: 360px; }
.modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 1rem; }
.modal-btns { display: flex; gap: 8px; margin-top: 1rem; }
.modal-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: 600; border: none; }
.btn-cancel { background: #f0f0f0; color: #666; }
.btn-ok { background: #a78bfa; color: white; }
.btn-danger { background: #fee2e2; color: #991b1b; }
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.loading-overlay.show { display: flex; }
.spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.kid-manage-btn { font-size: 11px; background: none; border: 1px solid #e0e0e0; border-radius: 8px; padding: 4px 8px; cursor: pointer; color: #888; }
.danger-zone { border-top: 1px solid #fee2e2; margin-top: 12px; padding-top: 12px; }
.color-picker-row { display: flex; gap: 8px; }
.color-btn { flex: 1; padding: 8px 4px; border: 2px solid transparent; border-radius: 10px; text-align: center; cursor: pointer; font-size: 12px; }
.color-btn.selected { outline: 3px solid #a78bfa; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🌈 みんなのおこづかい帳</h1>
    <div class="sync-bar">
      <div class="sync-dot" id="sync-dot" style="background:#fcd34d"></div>
      <span id="sync-label" style="opacity:0.9">読み込み中...</span>
    </div>
  </div>
  <div class="kid-row">
    <div id="kid-tabs" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    <button class="kid-add" onclick="openAddKid()">+ こどもを追加</button>
  </div>
  <div id="main-content"></div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <span id="loading-msg">保存中...</span>
</div>

<div class="overlay" id="add-kid-modal">
  <div class="modal">
    <h3>👶 こどもを追加</h3>
    <div class="form-row">
      <label>なまえ</label>
      <input type="text" id="new-kid-name" placeholder="例：はなこ" />
    </div>
    <div class="form-row">
      <label>アイコンの色</label>
      <div class="color-picker-row" id="color-picker">
        <div class="color-btn" style="border-color:#f9a8d4;background:#fdf2f8;color:#9d174d" onclick="selectColor(0,this)">ピンク</div>
        <div class="color-btn" style="border-color:#93c5fd;background:#eff6ff;color:#1e40af" onclick="selectColor(1,this)">ブルー</div>
        <div class="color-btn" style="border-color:#86efac;background:#f0fdf4;color:#166534" onclick="selectColor(2,this)">グリーン</div>
        <div class="color-btn" style="border-color:#fcd34d;background:#fffbeb;color:#92400e" onclick="selectColor(3,this)">イエロー</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAllModals()">キャンセル</button>
      <button class="btn-ok" onclick="addKid()">追加する</button>
    </div>
  </div>
</div>

<div class="overlay" id="edit-kid-modal">
  <div class="modal">
    <h3>✏️ こどもの設定</h3>
    <div class="form-row">
      <label>なまえを変更</label>
      <input type="text" id="edit-kid-name" placeholder="なまえ" />
    </div>
    <div class="form-row">
      <label>色を変更</label>
      <div class="color-picker-row" id="edit-color-picker">
        <div class="color-btn" style="border-color:#f9a8d4;background:#fdf2f8;color:#9d174d" onclick="selectEditColor(0,this)">ピンク</div>
        <div class="color-btn" style="border-color:#93c5fd;background:#eff6ff;color:#1e40af" onclick="selectEditColor(1,this)">ブルー</div>
        <div class="color-btn" style="border-color:#86efac;background:#f0fdf4;color:#166534" onclick="selectEditColor(2,this)">グリーン</div>
        <div class="color-btn" style="border-color:#fcd34d;background:#fffbeb;color:#92400e" onclick="selectEditColor(3,this)">イエロー</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAllModals()">キャンセル</button>
      <button class="btn-ok" onclick="saveEditKid()">保存する</button>
    </div>
    <div class="danger-zone">
      <button style="width:100%;padding:12px;border-radius:10px;border:none;background:#fee2e2;color:#991b1b;font-size:14px;font-weight:600;cursor:pointer;" onclick="confirmDeleteKid()">🗑 このこどもを削除する</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzFeht-1rP5e1gVHoqfDbN-zMQHH6_krHHNWhxPkoCsgI5_cV0cI1n5u5_zlGoxwIkK/exec';

const COLORS = [
  {border:'#f9a8d4',bg:'#fdf2f8',text:'#9d174d'},
  {border:'#93c5fd',bg:'#eff6ff',text:'#1e40af'},
  {border:'#86efac',bg:'#f0fdf4',text:'#166534'},
  {border:'#fcd34d',bg:'#fffbeb',text:'#92400e'},
];
let selectedColorIdx = 0;
let editingColorIdx = 0;
let editingKidId = null;

const DEFAULT_CATS = {
  income: ['おこづかい','おとしだま','おてつだい報酬','プレゼント','その他'],
  expense: ['おかし','おもちゃ','ほん','ゲーム','その他'],
  point: ['そうじ','おかたづけ','おつかい','宿題','食器洗い','その他']
};

let state = {
  kids: [],
  activeKid: null,
  activeTab: 'summary',
  form: {type:'income', cat:'', subcat:'', amount:''},
  nextId: 1
};

function fmt(n){ return Number(n).toLocaleString()+'円'; }
function fmtP(n){ return n+'pt'; }
function getKid(){ return state.kids.find(k=>k.id===state.activeKid); }

function setSyncStatus(status,msg){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot||!lbl) return;
  dot.style.background={ok:'#86efac',error:'#f87171',loading:'#fcd34d'}[status]||'#fcd34d';
  lbl.textContent=msg;
}
function showLoading(msg){ document.getElementById('loading-msg').textContent=msg||'保存中...'; document.getElementById('loading').classList.add('show'); }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }
function closeAllModals(){ document.querySelectorAll('.overlay').forEach(m=>m.classList.remove('open')); }

function gasGet(){
  return new Promise((resolve,reject)=>{
    const cbName='_cb'+Date.now();
    const script=document.createElement('script');
    const timer=setTimeout(()=>{ cleanup(); reject(new Error('timeout')); },12000);
    function cleanup(){ clearTimeout(timer); delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); }
    window[cbName]=function(data){ cleanup(); resolve(data); };
    script.src=GAS_URL+'?callback='+cbName+'&t='+Date.now();
    script.onerror=()=>{ cleanup(); reject(new Error('load error')); };
    document.head.appendChild(script);
  });
}

async function loadFromGAS(){
  setSyncStatus('loading','読み込み中...');
  try {
    const json=await gasGet();
    if(json.status==='ok' && json.data){
      const {kids, records}=json.data;
      if(kids && kids.length>0){
        state.kids=kids.map(k=>({
          ...k,
          color: COLORS[k.colorIdx]||COLORS[0],
          cats: k.cats||{income:[...DEFAULT_CATS.income],expense:[...DEFAULT_CATS.expense],point:[...DEFAULT_CATS.point]},
          records:[]
        }));
        state.nextId=Math.max(...state.kids.map(k=>k.id))+1;
      }
      if(records && records.length>0){
        records.forEach(r=>{
          const kid=state.kids.find(k=>k.id===Number(r.kidId));
          if(kid) kid.records.push({...r, amount:Number(r.amount), ts: String(r.ts)});
        });
      }
      state.kids.forEach(kid=>{
        kid.balance=0; kid.points=0;
        kid.records.forEach(r=>{
          if(r.type==='income') kid.balance+=r.amount;
          else if(r.type==='expense') kid.balance=Math.max(0,kid.balance-r.amount);
          else if(r.type==='point'){ kid.points+=r.amount; kid.balance+=r.amount; }
        });
      });
      if(state.kids.length>0) state.activeKid=state.kids[0].id;
      setSyncStatus('ok','同期済み ✓');
    } else {
      setSyncStatus('ok','データなし（新規）');
    }
  } catch(e){
    setSyncStatus('error','読み込み失敗 – オフラインで使用中');
  }
  render();
}

async function saveToGAS(){
  showLoading('保存中...');
  setSyncStatus('loading','保存中...');
  const kidsData=state.kids.map(k=>({
    id:k.id, name:k.name,
    colorIdx:COLORS.indexOf(k.color),
    goal:k.goal, cats:k.cats
  }));
  const recordsData=[];
  state.kids.forEach(kid=>{
    kid.records.forEach(r=>{
      recordsData.push({...r, kidId:kid.id, kidName:kid.name, ts:String(r.ts)});
    });
  });
  try {
    await new Promise((resolve,reject)=>{
      const xhr=new XMLHttpRequest();
      xhr.open('POST',GAS_URL,true);
      xhr.setRequestHeader('Content-Type','text/plain');
      xhr.timeout=12000;
      xhr.onload=()=>resolve();
      xhr.onerror=()=>reject(new Error('xhr error'));
      xhr.ontimeout=()=>reject(new Error('timeout'));
      xhr.send(JSON.stringify({action:'save', kids:kidsData, records:recordsData}));
    });
    setSyncStatus('ok','保存しました ✓');
  } catch(e){
    setSyncStatus('error','保存失敗 – 再度お試しください');
  }
  hideLoading();
}

function render(){ renderKidTabs(); renderContent(); }

function renderKidTabs(){
  document.getElementById('kid-tabs').innerHTML=state.kids.map(k=>`
    <button class="kid-tab ${k.id===state.activeKid?'active':''}"
      style="${k.id===state.activeKid?'background:'+k.color.border+';color:'+k.color.text+';border-color:'+k.color.border:''}"
      onclick="switchKid(${k.id})">${k.name}</button>
  `).join('');
}

function renderContent(){
  const kid=getKid();
  if(!kid){
    document.getElementById('main-content').innerHTML=`<div class="card"><div class="empty-state">「+ こどもを追加」ボタンから<br>お子さんを登録してね！</div></div>`;
    return;
  }
  document.getElementById('main-content').innerHTML=`
    <div class="tabs">
      <button class="tab ${state.activeTab==='summary'?'active':''}" onclick="switchTab('summary')">サマリー</button>
      <button class="tab ${state.activeTab==='add'?'active':''}" onclick="switchTab('add')">記録する</button>
      <button class="tab ${state.activeTab==='history'?'active':''}" onclick="switchTab('history')">履歴</button>
      <button class="tab ${state.activeTab==='cats'?'active':''}" onclick="switchTab('cats')">カテゴリ</button>
    </div>
    ${state.activeTab==='summary'?renderSummary(kid):''}
    ${state.activeTab==='add'?renderAdd(kid):''}
    ${state.activeTab==='history'?renderHistory(kid):''}
    ${state.activeTab==='cats'?renderCats(kid):''}
  `;
  if(state.activeTab==='add') bindForm();
}

function renderSummary(kid){
  const prog=Math.min(100,Math.round(kid.balance/kid.goal.target*100));
  const now=new Date(); const m=now.getMonth(); const y=now.getFullYear();
  const thisMonth=kid.records.filter(r=>{ const d=new Date(r.ts); return d.getMonth()===m&&d.getFullYear()===y; });
  const inc=thisMonth.filter(r=>r.type==='income').reduce((s,r)=>s+Number(r.amount),0);
  const exp=thisMonth.filter(r=>r.type==='expense').reduce((s,r)=>s+Number(r.amount),0);
  const pts=thisMonth.filter(r=>r.type==='point').reduce((s,r)=>s+Number(r.amount),0);
  return `
    <div class="summary-grid">
      <div class="summary-item" style="background:${kid.color.bg}">
        <div class="summary-label">💰 ざんだか</div>
        <div class="summary-value" style="color:${kid.color.text}">${fmt(kid.balance)}</div>
      </div>
      <div class="summary-item" style="background:#fff7ed">
        <div class="summary-label">⭐ ポイント</div>
        <div class="summary-value" style="color:#9a3412">${fmtP(kid.points)}</div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:16px;font-weight:700;color:#333">${kid.name}</div>
        <button class="kid-manage-btn" onclick="openEditKid(${kid.id})">✏️ 名前変更・削除</button>
      </div>
      <div class="section-title">🎯 目標ちょきん：${kid.goal.name}</div>
      <div style="font-size:13px;color:#888;margin-bottom:4px">${fmt(kid.balance)} / ${fmt(kid.goal.target)}</div>
      <div class="goal-bar-wrap"><div class="goal-bar" style="width:${prog}%;background:${kid.color.border}"></div></div>
      <div class="goal-info"><span>のこり ${fmt(Math.max(0,kid.goal.target-kid.balance))}</span><span>${prog}%</span></div>
      <button style="margin-top:10px;font-size:12px;background:none;border:1px dashed #ccc;border-radius:8px;padding:8px 12px;cursor:pointer;color:#888;width:100%" onclick="editGoal()">✏️ 目標を変える</button>
    </div>
    <div class="card">
      <div class="section-title">📊 今月のまとめ</div>
      ${thisMonth.length===0
        ? '<div class="empty-state">まだ記録がないよ</div>'
        : `<div style="display:flex;gap:10px;text-align:center">
            <div style="flex:1"><div style="font-size:11px;color:#888">もらった</div><div style="font-size:16px;font-weight:700;color:#166534">+${fmt(inc)}</div></div>
            <div style="flex:1"><div style="font-size:11px;color:#888">つかった</div><div style="font-size:16px;font-weight:700;color:#991b1b">-${fmt(exp)}</div></div>
            <div style="flex:1"><div style="font-size:11px;color:#888">ポイント</div><div style="font-size:16px;font-weight:700;color:#9a3412">+${fmtP(pts)}</div></div>
          </div>`}
    </div>
  `;
}

function renderAdd(kid){
  const f=state.form;
  const cats=kid.cats[f.type]||[];
  const btnColor=f.type==='income'?'#4ade80':f.type==='expense'?'#f87171':'#fb923c';
  const btnLabel=f.type==='income'?'💰 収入を記録':f.type==='expense'?'🛍 支出を記録':'⭐ ポイントを記録';
  const subcatHint=f.type==='income'?'例：おばあちゃんから':f.type==='expense'?'例：コンビニで':'例：漢字ドリル';
  return `
    <div class="card">
      <div class="form-row">
        <div class="radio-group">
          <div class="radio-btn ${f.type==='income'?'sel-income':''}" onclick="setType('income')">💰 もらった</div>
          <div class="radio-btn ${f.type==='expense'?'sel-expense':''}" onclick="setType('expense')">🛍 つかった</div>
          <div class="radio-btn ${f.type==='point'?'sel-point':''}" onclick="setType('point')">⭐ ポイント</div>
        </div>
      </div>
      <div class="form-row">
        <label>カテゴリ</label>
        <select id="f-cat">${cats.map(c=>`<option ${c===f.cat?'selected':''}>${c}</option>`).join('')}</select>
        <input class="subcat-input" type="text" id="f-subcat" placeholder="${subcatHint}" value="${f.subcat}" />
        <div class="subcat-hint">↑ くわしい内容（省略OK）</div>
      </div>
      <div class="form-row">
        <label>${f.type==='point'?'ポイント数':'きんがく（円）'}</label>
        <input type="number" id="f-amount" placeholder="${f.type==='point'?'1':'100'}" value="${f.amount}" min="1" inputmode="numeric" />
      </div>
      <button class="submit-btn" style="background:${btnColor}" onclick="submitRecord()">${btnLabel}</button>
    </div>
  `;
}

function renderHistory(kid){
  if(kid.records.length===0) return '<div class="card"><div class="empty-state">まだ記録がないよ🌱<br>「記録する」タブから追加してね！</div></div>';
  return '<div class="card">'+[...kid.records].reverse().map((r,revIdx)=>{
    const idx=kid.records.length-1-revIdx;
    const icon=r.type==='income'?'💰':r.type==='expense'?'🛍':'⭐';
    const iconBg=r.type==='income'?'#f0fdf4':r.type==='expense'?'#fef2f2':'#fff7ed';
    const amtColor=r.type==='income'?'#166534':r.type==='expense'?'#991b1b':'#9a3412';
    const amtText=r.type==='income'?`+${fmt(r.amount)}`:r.type==='expense'?`-${fmt(r.amount)}`:`+${fmtP(r.amount)}`;
    return `<div class="history-item">
      <div class="history-icon" style="background:${iconBg}">${icon}</div>
      <div class="history-main">
        <div class="history-cat">${r.cat}</div>
        ${r.subcat?`<div class="history-subcat">${r.subcat}</div>`:''}
        <div class="history-date">${r.dateStr||r.ts.slice(0,10)}</div>
      </div>
      <div class="history-right">
        <div class="history-amount" style="color:${amtColor}">${amtText}</div>
        <button class="del-btn" onclick="deleteRecord(${idx})">削除</button>
      </div>
    </div>`;
  }).join('')+'</div>';
}

function renderCats(kid){
  return ['income','expense','point'].map(type=>{
    const label=type==='income'?'💰 もらった':type==='expense'?'🛍 つかった':'⭐ ポイント';
    const bg=type==='income'?'#f0fdf4':type==='expense'?'#fef2f2':'#fff7ed';
    const col=type==='income'?'#166534':type==='expense'?'#991b1b':'#9a3412';
    return `<div class="card">
      <div class="type-label" style="background:${bg};color:${col}">${label}</div>
      <div id="catlist-${type}">
        ${kid.cats[type].map((c,i)=>`
          <div class="cat-item">
            <input type="text" value="${c}" onchange="updateCat('${type}',${i},this.value)" />
            <button class="cat-del" onclick="deleteCat('${type}',${i})">×</button>
          </div>
        `).join('')}
      </div>
      <button class="cat-add-btn" onclick="addCat('${type}')">＋ カテゴリを追加</button>
      <button class="cat-save-btn" onclick="saveCats()">💾 カテゴリを保存する</button>
      <div class="save-msg" id="saved-${type}">保存しました！</div>
    </div>`;
  }).join('');
}

function bindForm(){
  const a=document.getElementById('f-amount');
  const s=document.getElementById('f-subcat');
  if(a) a.oninput=e=>state.form.amount=e.target.value;
  if(s) s.oninput=e=>state.form.subcat=e.target.value;
}

function setType(t){ state.form={type:t,cat:'',subcat:'',amount:''}; renderContent(); }
function switchKid(id){ state.activeKid=id; state.activeTab='summary'; render(); }
function switchTab(t){ state.activeTab=t; render(); }

async function submitRecord(){
  const kid=getKid();
  const amount=parseInt(document.getElementById('f-amount').value)||0;
  const subcat=document.getElementById('f-subcat').value.trim();
  const cat=document.getElementById('f-cat').value;
  const type=state.form.type;
  if(!amount||amount<=0){ alert('きんがく（またはポイント）を入力してね！'); return; }
  const d=new Date();
  const dateStr=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
  const ts=d.toISOString();
  kid.records.push({type,amount,subcat,cat,dateStr,ts,kidId:kid.id,kidName:kid.name});
  if(type==='income') kid.balance+=amount;
  else if(type==='expense') kid.balance=Math.max(0,kid.balance-amount);
  else if(type==='point'){ kid.points+=amount; kid.balance+=amount; }
  state.form={type:'income',cat:'',subcat:'',amount:''};
  state.activeTab='summary';
  render();
  await saveToGAS();
}

async function deleteRecord(idx){
  const kid=getKid();
  const r=kid.records[idx];
  if(!confirm(`「${r.cat}${r.subcat?' '+r.subcat:''}」を削除しますか？`)) return;
  if(r.type==='income') kid.balance=Math.max(0,kid.balance-r.amount);
  else if(r.type==='expense') kid.balance+=r.amount;
  else if(r.type==='point'){ kid.points=Math.max(0,kid.points-r.amount); kid.balance=Math.max(0,kid.balance-r.amount); }
  kid.records.splice(idx,1);
  render();
  await saveToGAS();
}

function updateCat(type,idx,val){ getKid().cats[type][idx]=val; }
function deleteCat(type,idx){
  const kid=getKid();
  if(kid.cats[type].length<=1){ alert('カテゴリは最低1つ必要です'); return; }
  kid.cats[type].splice(idx,1); renderContent();
}
function addCat(type){
  getKid().cats[type].push('新しいカテゴリ'); renderContent();
  const items=document.querySelectorAll(`#catlist-${type} .cat-item input`);
  if(items.length) items[items.length-1].focus();
}
async function saveCats(){
  await saveToGAS();
  ['income','expense','point'].forEach(type=>{
    const el=document.getElementById('saved-'+type);
    if(el){ el.style.display='block'; clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none',1500); }
  });
}

async function editGoal(){
  const kid=getKid();
  const name=prompt('目標の名前は？',kid.goal.name);
  if(!name) return;
  const target=parseInt(prompt('目標の金額（円）は？',kid.goal.target));
  if(!target||target<=0) return;
  kid.goal={name,target};
  render();
  await saveToGAS();
}

function openAddKid(){ document.getElementById('add-kid-modal').classList.add('open'); }
function selectColor(idx,el){
  selectedColorIdx=idx;
  document.querySelectorAll('#color-picker .color-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}
function selectEditColor(idx,el){
  editingColorIdx=idx;
  document.querySelectorAll('#edit-color-picker .color-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}
async function addKid(){
  const name=document.getElementById('new-kid-name').value.trim();
  if(!name){ alert('なまえを入力してね'); return; }
  const newKid={
    id:state.nextId++, name, color:COLORS[selectedColorIdx],
    balance:0, points:0, goal:{name:'ひみつのゆめ',target:1000},
    cats:{income:[...DEFAULT_CATS.income],expense:[...DEFAULT_CATS.expense],point:[...DEFAULT_CATS.point]},
    records:[]
  };
  state.kids.push(newKid);
  state.activeKid=newKid.id;
  document.getElementById('new-kid-name').value='';
  closeAllModals();
  render();
  await saveToGAS();
}
function openEditKid(id){
  editingKidId=id;
  const kid=state.kids.find(k=>k.id===id);
  document.getElementById('edit-kid-name').value=kid.name;
  editingColorIdx=COLORS.indexOf(kid.color);
  document.querySelectorAll('#edit-color-picker .color-btn').forEach((b,i)=>{
    b.classList.toggle('selected',i===editingColorIdx);
  });
  document.getElementById('edit-kid-modal').classList.add('open');
}
async function saveEditKid(){
  const name=document.getElementById('edit-kid-name').value.trim();
  if(!name){ alert('なまえを入力してね'); return; }
  const kid=state.kids.find(k=>k.id===editingKidId);
  kid.name=name;
  kid.color=COLORS[editingColorIdx];
  closeAllModals();
  render();
  await saveToGAS();
}
async function confirmDeleteKid(){
  const kid=state.kids.find(k=>k.id===editingKidId);
  if(!confirm(`「${kid.name}」のデータをすべて削除しますか？\nこの操作は元に戻せません。`)) return;
  state.kids=state.kids.filter(k=>k.id!==editingKidId);
  state.activeKid=state.kids.length>0?state.kids[0].id:null;
  closeAllModals();
  render();
  await saveToGAS();
}

loadFromGAS();
</script>
</body>
</html>
